    .glass-card {
      width: 380px;
      max-width: 90%;
      padding: 30px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      color: white;
    }

    .glass-card .form-control {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
    }

    .glass-card .form-control::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .form-label {
      color: white;
    }

    .btn-primary {
      border-radius: 6px;
    }

    footer {
      text-align: center;
      padding: 6px 0;
       margin-top: auto;
      background: rgba(0,0,0,0.85);
      color: white;
      font-size: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .back-arrow {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 30px;
      text-decoration: none;
      color: rgb(221, 207, 207);
      z-index: 999999;
      opacity: 1; /* always fully visible */
    }

    .back-arrow:hover {
       color: grey;
    }

    <div class="text-center mb-4">
      <h3 class="fw-bold text-white mb-0">Admin</h3>
      <p class="text-white-50 mb-0" style="font-size: 0.9rem;">Sign in</p>
    </div>


    <form method="POST" action="{{ url_for('login') }}" class="mb-3">

      
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" type="text" class="form-control" placeholder="Enter username" required>
      </div>

      
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input name = "password" type="password" id="password" class="form-control" placeholder="Enter password" required>
      </div>

      
      <div class="mb-3 form-check">
        <input type="checkbox" id="showPass" class="form-check-input" onclick="togglePassword()">
        <label for="showPass" class="form-check-label text-white">
          Show Password
        </label>
      </div>

      
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">
          Login
        </button>
      </div>

    </form>

  </div>

</div>

<script>
  function togglePassword() {
    const pass = document.getElementById("password");
    const check = document.getElementById("showPass");

    pass.type = check.checked ? "text" : "password";
  }
</script>
