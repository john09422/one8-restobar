<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Reservation | One8 Restobar</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Permanent+Marker&display=swap" rel="stylesheet">

  <style>
    /* RESET & VARIABLES */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #ffc107;
      --secondary: #4da6ff;
      --dark-bg: rgba(0,0,0,0.85);
      --text-primary: white;
      --text-secondary: rgba(255,255,255,0.7);
      --border-light: rgba(255,255,255,0.1);
      --font-main: 'Montserrat', sans-serif;
      --font-accent: 'Permanent Marker', cursive;
    }

    /* BODY */
    body {
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
      url('https://scontent.fceb6-3.fna.fbcdn.net/v/t39.30808-6/481902568_560156343741149_5682722369065126025_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=833d8c&_nc_eui2=AeGi4BxIJuWaEP0ae_rAClZefXzDCaubu-V9fMMJq5u75e9nUamo8O-HSwzMjvz9By0FiveQO84UlisK7DrmKMmX&_nc_ohc=6rZXJfB71FMQ7kNvwHqlwGF&_nc_oc=AdpwLZeyteVt31QhRf4x-LDoS03oH9wVRkS-655s2hhRQqvRA9-fNwHXN4hYuwwR3PU&_nc_zt=23&_nc_ht=scontent.fceb6-3.fna&_nc_gid=3rOECVX7jjdWRhQNY4czSg&_nc_ss=7b2a8&oh=00_Af6WoRRY06DCQKjQmMrVh44-AzqBSz1nDzhnnHwrkloNJQ&oe=6A11AAB4');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text-primary);
      font-family: var(--font-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAVBAR */
    .navbar {
      background: var(--dark-bg);
      backdrop-filter: blur(12px);
      padding: 12px 40px;
      height: 90px;
    }

    .navbar-brand {
      color: var(--text-primary) !important;
      font-weight: 700;
      font-size: 1.5rem;
    }

    .brand-white {
      color: var(--text-primary) !important;
      font-weight: 700;
    }

    .nav-link {
      color: var(--text-primary) !important;
      font-weight: 600;
      text-decoration: none;
      position: relative;
      transition: 0.3s ease;
      margin-right: 20px;
    }

    .nav-link:hover {
      color: var(--secondary) !important;
    }

    .nav-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 0%;
      height: 2px;
      background: var(--secondary);
      transition: 0.3s ease;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    .active-link {
      color: var(--text-primary) !important;
      position: relative;
    }

    .active-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 100%;
      height: 2px;
      background: var(--primary);
    }

    /* Compatibility class */
    .nav-hover {
      color: var(--text-primary) !important;
      font-weight: 600;
      margin-right: 20px;
      position: relative;
      transition: 0.3s ease;
    }

    .nav-hover:hover { color: var(--secondary) !important; }
    .nav-hover::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 0%;
      height: 2px;
      background: var(--secondary);
      transition: 0.3s ease;
    }
    .nav-hover:hover::after { width: 100%; }

    .form-control {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--text-primary);
    }

    .form-control::placeholder {
      color: var(--text-secondary);
    }

    .btn-custom {
      background: var(--primary);
      border: none;
      font-weight: bold;
      color: black;
      width: 100%;
      margin-top: 15px;
      padding: 12px 28px;
      border-radius: 8px;
      transition: 0.3s ease;
      cursor: pointer;
    }

    .btn-custom:hover {
      background: #e0a800;
      transform: translateY(-2px);
    }

    .btn-back {
      background: transparent;
      border: 1px solid var(--text-primary);
      color: var(--text-primary);
      width: 100%;
      margin-top: 10px;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 600;
      transition: 0.3s ease;
      cursor: pointer;
    }

    .btn-back:hover {
      background: var(--text-primary);
      color: black;
    }

    footer {
      text-align: center;
      padding: 15px;
      margin-top: auto;
      background: var(--dark-bg);
      font-size: 14px;
      border-top: 1px solid var(--border-light);
    }

        .active-link { color: var(--text-primary) !important; }
    .active-link::after { width: 100%; background: var(--primary); }
  </style>
</head>

<body>

<nav class="navbar navbar-dark px-4">
  <a class="navbar-brand" href="{{ url_for('home') }}" style="font-weight: 700; font-size: 1.5rem;">ONE8 RESTOBAR</a>

  <div class="ms-auto d-flex align-items-center">
    <a class="nav-link nav-hover" href="{{ url_for('home') }}">Home</a>
    <a class="nav-link nav-hover" href="{{ url_for('menu') }}">Menu</a>
    <a class="nav-link nav-hover active-link" href="{{ url_for('reservation') }}">Reservation</a>

  </div>
</nav>


<div class="container">

  <div class="reservation-box">

    <h2 class="text-center mb-4" style="color: var(--primary);">Reservation Form</h2>

    <!-- IMPORTANT: FORM WRAPS EVERYTHING -->
    <form action="/create" method="post">

      <div class="row">

        <div class="col-md-6">
          <input id="name" name="full_name" type="text" class="form-control mb-3" placeholder="Full Name">
        </div>

        <div class="col-md-6">
          <input id="email" name="email" type="email" class="form-control mb-3" placeholder="Email Address">
        </div>

        <div class="col-md-6">
          <input id="phone" name="phone_number" type="text" class="form-control mb-3" placeholder="Phone Number">
        </div>

        <div class="col-md-6">
          <input id="address" name="address" type="text" class="form-control mb-3" placeholder="Address">
        </div>

        <div class="col-md-6">
          <input id="guests" name="guests" type="number" class="form-control mb-3" placeholder="Number of Guests">
        </div>

        <div class="col-md-6">
          <input id="date" name="reservation_date" type="date" class="form-control mb-3">
        </div>

        <div class="col-md-6">
          <input id="time" name="reservation_time" type="time" class="form-control mb-3">
        </div>

        <div class="col-md-12">
          <textarea id="note" name="special_request" class="form-control mb-3" rows="4" placeholder="Special Requests"></textarea>
        </div>

      </div>

     
      <button type="submit" class="btn btn-custom">
        Confirm Reservation
      </button>

      <a href="{{ url_for('menu') }}" class="btn btn-back">
        Back to Menu
      </a>

    </form>

  </div>

</div>

<footer>
  © 2026 One8 Restobar All Rights Reserved
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
