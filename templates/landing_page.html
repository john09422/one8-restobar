<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>One8 Restobar | Welcome</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@400;700&family=Permanent+Marker&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #ffc107;
      --secondary: #4da6ff;
      --dark-bg: rgba(0,0,0,0.85);
      --text-primary: white;
      --text-secondary: rgba(255,255,255,0.7);
      --border-light: rgba(255,255,255,0.1);
      --font-main: 'Montserrat', sans-serif;
      --font-accent: 'Permanent Marker', cursive;
    }

    body {
      font-family: var(--font-main);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background:
      linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
      url("https://scontent.fceb6-1.fna.fbcdn.net/v/t39.30808-6/488922944_587177307705719_3192241748937043130_n.jpg?_nc_cat=105&ccb=1-7&_nc_sid=833d8c&_nc_eui2=AeE_yuSIm83pEylELhu4FQZDq7LjrFq3NEqrsuOsWrc0ShJ4qMsXfjtl0so71P9KunrGbpItMuN6CEkSn-hTpl2l&_nc_ohc=sWPxH7tEreQQ7kNvwHE26yA&_nc_oc=Adou9MqRvBIA79LDRbBxzYlC8OWVxVJ1OLu4YFEXwjvJIaqHqCnVPo1p5ms-34kdeko&_nc_zt=23&_nc_ht=scontent.fceb6-1.fna&_nc_gid=S39D0VY8r33qpI0GnCH7lQ&_nc_ss=7b2a8&oh=00_Af5KacfdzzLFPBnE2XkebfNGs8y8tK_rLCoXEsk0UQp_3A&oe=6A11B19F");
      background-size: cover;
      background-position: center;
    }

    /* NAVBAR */
    .navbar {
      background: var(--dark-bg);
      backdrop-filter: blur(12px);
    }

    .nav-link {
      color: white !important;
      font-weight: 600;
      transition: 0.3s;
    }

    .nav-link:hover {
      color: var(--secondary) !important;
    }

    /* HERO */
    .hero {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 60px 80px;
      gap: 50px;
    }

    .hero-content {
      flex: 1;
    }

    .hero h1 {
      font-family: var(--font-accent);
      font-size: clamp(2rem, 6vw, 4rem);
    }

    .hero-description {
      font-size: 1.1rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* PHOTO */
    .photo-box {
      width: 420px;
      height: 420px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* BUTTON */
    .button {
      display: inline-block;
      border-radius: 7px;
      border: none;
      background: rgb(142, 145, 142);
      color: black;
      font-size: 15px;
      font-family: var(--font-accent);
      padding: 1em 2em;
      transition: 0.2s;
      cursor: pointer;
    }

    .button:hover {
      background: #9fa0a1;
      color: white;
      transform: translateY(-3px);
    }

    /* HIGHLIGHTS */
    .highlight-section {
      padding: 60px 20px;
      text-align: center;
      background: rgba(0,0,0,0.6);
    }

    .highlight-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .highlight-item {
      width: 250px;
    }

    .highlight-item img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 15px;
    }

    /* FOOTER */
    .footer {
      background: var(--dark-bg);
      text-align: center;
      padding: 12px;
      font-size: 0.9rem;
    }

    /* 📱 MOBILE RESPONSIVE FIX */
    @media (max-width: 768px) {

      .hero {
        flex-direction: column;
        text-align: center;
        padding: 30px 20px;
      }

      .hero-content {
        text-align: center;
      }

      .photo-box {
        width: 280px;
        height: 280px;
      }

      .hero-description {
        font-size: 1rem;
      }

      .button {
        width: 100%;
      }

      .highlight-grid {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
